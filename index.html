<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Minecraft Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair">+</div>
    <div id="instructions">
        <strong>Controles:</strong><br>
        Clique na tela para capturar o mouse<br>
        W, A, S, D - Movimentação<br>
        Espaço - Pular<br>
        Clique Esquerdo - Destruir Bloco<br>
        Clique Direito - Criar Bloco
    </div>

    <script>
        // --- Configuração Básica do Three.js ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); // Céu azul
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Iluminação ---
        const ambientLight = new THREE.AmbientLight(0xcccccc, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(20, 40, 20);
        scene.add(directionalLight);

        // --- Texturas Simples (Cores) ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const materialGrama = new THREE.MeshLambertMaterial({ color: 0x557a2b });

        // --- Geração do Mundo (Chão de Blocos) ---
        const blocks = [];
        const worldSize = 20;

        for (let x = -worldSize/2; x < worldSize/2; x++) {
            for (let z = -worldSize/2; z < worldSize/2; z++) {
                // Cria uma variação de altura simples (ondulação)
                let y = Math.floor(Math.sin(x * 0.2) * 2 + Math.cos(z * 0.2) * 2);
                
                // Preenche de baixo até a altura calculada
                for (let h = -3; h <= y; h++) {
                    const block = new THREE.Mesh(geometry, materialGrama);
                    block.position.set(x, h, z);
                    scene.add(block);
                    blocks.push(block);
                }
            }
        }

        // --- Física e Controles de Movimento ---
        camera.position.set(0, 5, 0);
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let canJump = false;
        let prevTime = performance.now();

        // Bloqueio do Cursor (Pointer Lock)
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        let yaw = 0;
        let pitch = 0;

        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement === document.body) {
                yaw -= event.movementX * 0.002;
                pitch -= event.movementY * 0.002;
                pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch));

                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        // Teclado
        document.addEventListener('keydown', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 8; canJump = false; break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        // --- Sistema de Quebrar e Colocar Blocos (Raycaster) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Centro da tela

        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocks);

            if (intersects.length > 0 && intersects[0].distance < 6) {
                const intersect = intersects[0];

                if (e.button === 0) {
                    // Clique Esquerdo: Destruir Bloco
                    scene.remove(intersect.object);
                    blocks.splice(blocks.indexOf(intersect.object), 1);
                } else if (e.button === 2) {
                    // Clique Direito: Colocar Bloco baseado na face clicada
                    const position = new THREE.Vector3().copy(intersect.point).add(intersect.face.normal);
                    position.x = Math.round(position.x);
                    position.y = Math.round(position.y);
                    position.z = Math.round(position.z);

                    const newBlock = new THREE.Mesh(geometry, materialGrama);
                    newBlock.position.copy(position);
                    scene.add(newBlock);
                    blocks.push(newBlock);
                }
            }
        });

        // Previnir menu de contexto do clique direito
        document.addEventListener('contextmenu', e => e.preventDefault());

        // --- Loop de Animação (Física e Renderização) ---
        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement === document.body) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                // Reduz velocidade (atrito)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 2.0 * delta; // Gravidade

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Movimento relativo à direção da câmera
                const camDirection = new THREE.Vector3();
                camera.getWorldDirection(camDirection);
                camDirection.y = 0;
                camDirection.normalize();

                const camSide = new THREE.Vector3(-
