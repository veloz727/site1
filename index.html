<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Minecraft Launcher</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Barra de ferramentas superior */
        .top-bar {
            background-color: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #4a4a4a;
            z-index: 10;
        }

        .title {
            font-weight: bold;
            color: #4caf50;
            margin: 0;
            font-size: 1.4em;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        /* Inputs e Botões */
        input[type="text"] {
            padding: 8px;
            background-color: #444;
            border: 1px solid #666;
            color: #fff;
            border-radius: 4px;
            width: 250px;
        }

        button {
            padding: 8px 16px;
            background-color: #4caf50;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }

        button.danger {
            background-color: #f44336;
        }

        button.danger:hover {
            background-color: #da190b;
        }

        /* Área do Jogo */
        .game-container {
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Inicia oculto */
        }

        .placeholder-text {
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <p class="title">Eagler Launcher v2</p>
        
        <div class="controls">
            <button onclick="launch('https://eaglercraft.com/mc/1.8.8/')">Carregar 1.8.8</button>
            <button onclick="launch('https://eaglercraft.com/mc/1.5.2/')">Carregar 1.5.2</button>
            
            <input type="text" id="customUrl" placeholder="Ou cole outra URL aqui...">
            <button onclick="launchCustom()">Iniciar URL</button>
            
            <button class="danger" onclick="stopGame()">Fechar Jogo</button>
        </div>
    </div>

    <div class="game-container">
        <div id="placeholder" class="placeholder-text">
            <h2>Nenhum jogo iniciado</h2>
            <p>Clique em um dos botões acima para carregar o Minecraft no navegador.</p>
        </div>
        <iframe id="gameIframe" src="" allowfullscreen="true"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('gameIframe');
        const placeholder = document.getElementById('placeholder');
        const customInput = document.getElementById('customUrl');

        function launch(url) {
            placeholder.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = url;
        }

        function launchCustom() {
            const url = customInput.value.trim();
            if (url) {
                // Adiciona o protocolo http se o usuário esquecer
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    launch('https://' + url);
                } else {
                    launch(url);
                }
            } else {
                alert('Por favor, insira uma URL válida.');
            }
        }

        function stopGame() {
            iframe.src = '';
            iframe.style.display = 'none';
            placeholder.style.display = 'block';
        }
    </script>

</body>
</html>
