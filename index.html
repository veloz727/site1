<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Launcher</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .terminal-box {
            background: #111;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            text-align: left;
            border: 1px solid #00ff00;
            max-width: 450px;
            width: 100%;
        }

        .header-text {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px dashed #00ff00;
            padding-bottom: 10px;
        }

        .system-status {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 20px;
        }

        .btn-link {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #111;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-size: 1em;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        .btn-link:hover {
            background-color: #00ff00;
            color: #111;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .btn-link:active {
            transform: scale(0.98);
        }

        .prompt-symbol {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div class="header-text">
            <span class="prompt-symbol">></span> SYSTEM_LAUNCHER_INTERFACE
        </div>
        
        <div class="system-status">
            [STATUS] Inicializado com sucesso.<br>
            [AMB] VS Code Web Environment.<br>
