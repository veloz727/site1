<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagler Dashboard</title>
    <style>
        body {
            margin: 0;
            background-color: #0f0f13;
            font-family: system-ui, -apple-system, sans-serif;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #1a1b26;
            border: 1px solid #2f334d;
            border-radius: 8px;
            padding: 30px;
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            color: #7aa2f7;
            font-size: 1.5rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            background-color: #24283b;
            color: #bb9af7;
            border: 1px solid #414868;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: #7aa2f7;
            color: #1a1b26;
            border-color: #7aa2f7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Selecione o Cliente</h2>
        
        <a href="https://eaglercraft.com/mc/1.8.8/" target="_top" class="btn">Abrir Client 1.8.8</a>
        <a href="https://eaglercraft.com/mc/1.5.2/" target="_top" class="btn">Abrir Client 1.5.2</a>
    </div>

</body>
</html>
